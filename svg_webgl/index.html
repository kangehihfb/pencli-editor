<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiteboard Editor PoC (SVG-first)</title>
    <style>
      :root {
        --bg: #f6f7fb;
        --panel: #ffffff;
        --line: #d8deea;
        --text: #1f2a44;
        --accent: #2a63ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .layout {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100vh;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        flex-wrap: wrap;
      }
      button,
      select {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        background: white;
        cursor: pointer;
      }
      button.active {
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
      }
      #stageWrap {
        position: relative;
        overflow: hidden;
      }
      #stage {
        width: 100%;
        height: 100%;
        background: white;
        touch-action: none;
      }
      #viewportLayer {
        will-change: transform;
      }
      .overlay {
        pointer-events: none;
      }
      .footer {
        border-top: 1px solid var(--line);
        background: var(--panel);
        padding: 8px 10px;
        font-size: 12px;
        color: #5a6787;
      }
      .spacer {
        flex: 1;
      }
      .status {
        min-width: 280px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="toolbar">
        <button data-tool="pen" class="active">펜</button>
        <button data-tool="erase">지우개</button>
        <button data-tool="select">선택</button>
        <button data-tool="pan">손툴</button>
        <button id="addText">텍스트 추가</button>
        <button id="addImage">이미지 추가</button>
        <button id="zoomIn">확대</button>
        <button id="zoomOut">축소</button>
        <button id="resetView">뷰 리셋</button>
        <button id="toggleReadonly">읽기전용: OFF</button>
        <button id="undoBtn">되돌리기</button>
        <button id="redoBtn">앞으로가기</button>
        <button id="seedHeavy">요소 2000개 테스트</button>
        <button id="runBenchmark">성능 벤치 실행</button>
        <button id="runFunctionalSmoke">기능 스모크</button>
        <button id="runPerformanceSmoke">성능 스모크</button>
        <button id="runFullSuite">전체 테스트 스위트</button>
        <button id="resetMetrics">메트릭 초기화</button>
        <button id="exportJson">JSON 내보내기</button>
        <button id="exportGraphql">GraphQL용 내보내기</button>
        <button id="exportTestReport">테스트 리포트</button>
        <button id="importJson">JSON 불러오기</button>
        <span class="spacer"></span>
        <div class="status" id="statusText">ready</div>
      </div>
      <div id="stageWrap">
        <svg id="stage" viewBox="0 0 1280 720">
          <g id="viewportLayer"></g>
          <g id="overlayLayer" class="overlay"></g>
        </svg>
      </div>
      <div class="footer">
        SVG-first 테스트 에디터: Input/Model/Renderer 경계를 분리한 최소 PoC. WebGL은 렌더러 교체 포인트로만 고려.
      </div>
    </div>

    <script type="module">
      const SVG_NS = "http://www.w3.org/2000/svg";
      const stage = document.getElementById("stage");
      const viewportLayer = document.getElementById("viewportLayer");
      const overlayLayer = document.getElementById("overlayLayer");
      const statusText = document.getElementById("statusText");
      const toggleReadonlyButton = document.getElementById("toggleReadonly");

      const state = {
        tool: "pen",
        readonly: false,
        viewport: { x: 0, y: 0, zoom: 1 },
        selection: null,
        dragging: null,
        history: {
          undoStack: [],
          redoStack: [],
        },
        metrics: {
          lastRenderMs: 0,
          visibleCount: 0,
          avgRenderMs: 0,
          maxRenderMs: 0,
          fps: 0,
          longFrameCount: 0,
          pointerDownCount: 0,
          pointerMoveCount: 0,
          pointerUpCount: 0,
        },
        diagnostics: {
          benchmarkRuns: [],
          retestRuns: [],
          functionalSmokeRuns: [],
          performanceSmokeRuns: [],
          latestSuite: null,
        },
        doc: {
          version: 1,
          elements: [],
        },
      };
      const HISTORY_LIMIT = 100;
      const REPORT_STATUS = {
        PASS: "PASS",
        FAIL: "FAIL",
        NA: "N/A",
      };
      const REPORT_CHECKLIST_TEMPLATE = [
        { id: "1-pen-natural", title: "펜으로 자유곡선 필기가 자연스럽게 된다", type: "manual", category: "1) 기본 기능" },
        {
          id: "1-select-stroke-text-image",
          title: "선택 툴로 stroke / text / image를 선택할 수 있다",
          type: "manual",
          category: "1) 기본 기능",
        },
        { id: "1-move-selected", title: "선택된 객체를 이동할 수 있다", type: "manual", category: "1) 기본 기능" },
        {
          id: "1-resize-all-types",
          title: "선택 핸들로 text / image / stroke 리사이즈가 된다",
          type: "manual",
          category: "1) 기본 기능",
        },
        { id: "1-erase-delete", title: "지우개로 객체 삭제가 된다", type: "manual", category: "1) 기본 기능" },
        { id: "1-readonly-block", title: "읽기 전용 모드에서 편집 동작이 차단된다", type: "manual", category: "1) 기본 기능" },
        { id: "1-readonly-off-edit", title: "읽기 전용 OFF 후 다시 편집이 가능하다", type: "manual", category: "1) 기본 기능" },
        {
          id: "2-pan-smooth",
          title: "손툴 패닝 시 화면이 찢기거나 심하게 끊기지 않는다",
          type: "manual",
          category: "2) 뷰포트(줌/패닝) 정합성",
        },
        {
          id: "2-zoom-select-align",
          title: "줌 인/아웃 후 선택 위치가 시각적으로 맞는다",
          type: "manual",
          category: "2) 뷰포트(줌/패닝) 정합성",
        },
        {
          id: "2-zoom-transform-stable",
          title: "줌 후 이동/리사이즈 좌표가 튀지 않는다",
          type: "manual",
          category: "2) 뷰포트(줌/패닝) 정합성",
        },
        { id: "2-reset-view-ok", title: "뷰 리셋 이후 편집 동작이 정상이다", type: "manual", category: "2) 뷰포트(줌/패닝) 정합성" },
        {
          id: "3-mouse-point-align",
          title: "마우스 입력에서 포인터 위치와 실제 선 위치가 일치한다",
          type: "manual",
          category: "3) 입력 품질",
        },
        {
          id: "3-touch-input-ok",
          title: "터치 입력에서 오동작 없이 필기/선택이 된다",
          type: "manual",
          category: "3) 입력 품질",
        },
        {
          id: "3-pen-pressure",
          title: "펜 입력에서 pressure 반응이 체감된다 (지원 기기)",
          type: "manual",
          category: "3) 입력 품질",
        },
        {
          id: "3-fast-draw-latency",
          title: "빠른 필기 시 선이 뒤늦게 그려지지 않는다",
          type: "manual",
          category: "3) 입력 품질",
        },
        { id: "4-undo-redo-draw", title: "필기 후 undo/redo가 정상 동작한다", type: "manual", category: "4) 히스토리(되돌리기/앞으로가기)" },
        {
          id: "4-undo-redo-transform",
          title: "이동/리사이즈 후 undo/redo가 정상 동작한다",
          type: "manual",
          category: "4) 히스토리(되돌리기/앞으로가기)",
        },
        { id: "4-undo-redo-erase", title: "지우개 후 undo/redo가 정상 동작한다", type: "manual", category: "4) 히스토리(되돌리기/앞으로가기)" },
        { id: "4-undo-after-import", title: "JSON import 후 undo가 정상 동작한다", type: "manual", category: "4) 히스토리(되돌리기/앞으로가기)" },
        { id: "5-export-json-file", title: "JSON 내보내기 파일이 생성된다", type: "manual", category: "5) 데이터(저장/복원/내보내기)" },
        { id: "5-import-roundtrip", title: "JSON 불러오기로 동일 상태가 복원된다", type: "manual", category: "5) 데이터(저장/복원/내보내기)" },
        {
          id: "5-export-graphql-two-files",
          title: "GraphQL용 내보내기 파일 2개가 생성된다",
          type: "manual",
          category: "5) 데이터(저장/복원/내보내기)",
        },
        {
          id: "5-graphql-template-mapping",
          title: "GraphQL 변수 템플릿의 필드를 실제 백엔드 스키마로 매핑 가능하다",
          type: "manual",
          category: "5) 데이터(저장/복원/내보내기)",
        },
        { id: "6-no-freeze", title: "조작 중 멈춤(프리즈) 없이 동작한다", type: "manual", category: "6) 성능" },
        {
          id: "6-render-ms-stable",
          title: "상태바 `render=...ms`가 과도하게 급등하지 않는다",
          type: "auto",
          category: "6) 성능",
        },
        {
          id: "6-visible-culling",
          title: "`visible` 컬링이 동작해 화면 밖 요소 렌더가 줄어든다",
          type: "auto",
          category: "6) 성능",
        },
        {
          id: "6-thermal-battery",
          title: "열 사용(발열)/배터리 소모가 비정상적으로 크지 않다 (모바일)",
          type: "manual",
          category: "6) 성능",
        },
        { id: "0-pointer-support", title: "PointerEvent 런타임 지원", type: "auto", category: "0) 테스트 환경" },
        { id: "0-history-recorded", title: "히스토리 스택 활동 기록 존재", type: "auto", category: "0) 테스트 환경" },
      ];
      const REPORT_STATUS_GUIDE = {
        PASS: "검증 완료, 기대 결과 충족",
        FAIL: "검증 완료, 기대 결과 미충족",
        "N/A": "아직 미검증 또는 수동 검증 필요",
      };
      const REPORT_USAGE_NOTES = [
        "passFailChecklist[*].id 를 TEST_CHECKLIST.md의 id와 1:1로 대조한다.",
        "type=auto 항목은 현재 런타임 메트릭으로 자동 판정된다.",
        "type=manual 항목은 testerNote를 채워 최종 PASS/FAIL로 확정한다.",
      ];

      const worldToSvg = (p) => ({
        x: (p.x - state.viewport.x) * state.viewport.zoom,
        y: (p.y - state.viewport.y) * state.viewport.zoom,
      });
      const svgToWorld = (p) => ({
        x: p.x / state.viewport.zoom + state.viewport.x,
        y: p.y / state.viewport.zoom + state.viewport.y,
      });

      const makeId = (prefix) => `${prefix}_${Math.random().toString(36).slice(2, 10)}`;
      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
      const cloneDoc = (doc) => JSON.parse(JSON.stringify(doc));
      const hasSecureSha256 = () => Boolean(globalThis.crypto?.subtle?.digest);
      const fallbackHashString = (value) => {
        // Non-cryptographic fallback for environments without WebCrypto.
        let h1 = 0x811c9dc5;
        let h2 = 0x811c9dc5 ^ 0x9e3779b9;
        let h3 = 0x811c9dc5 ^ 0x85ebca6b;
        let h4 = 0x811c9dc5 ^ 0xc2b2ae35;
        for (let i = 0; i < value.length; i += 1) {
          const c = value.charCodeAt(i);
          h1 = Math.imul(h1 ^ c, 0x01000193) >>> 0;
          h2 = Math.imul(h2 ^ (c + i), 0x01000193) >>> 0;
          h3 = Math.imul(h3 ^ (c * 31), 0x01000193) >>> 0;
          h4 = Math.imul(h4 ^ (c * 131), 0x01000193) >>> 0;
        }
        const words = [
          h1 >>> 0,
          h2 >>> 0,
          h3 >>> 0,
          h4 >>> 0,
          (h1 ^ h3) >>> 0,
          (h2 ^ h4) >>> 0,
          (h1 ^ h2 ^ h3) >>> 0,
          (h2 ^ h3 ^ h4) >>> 0,
        ];
        return words.map((w) => w.toString(16).padStart(8, "0")).join("");
      };
      const hashString = async (value) => {
        if (hasSecureSha256()) {
          const data = new TextEncoder().encode(value);
          const digest = await globalThis.crypto.subtle.digest("SHA-256", data);
          const bytes = Array.from(new Uint8Array(digest));
          return {
            sha256: bytes.map((b) => b.toString(16).padStart(2, "0")).join(""),
            algorithm: "SHA-256",
            secure: true,
          };
        }
        return {
          sha256: fallbackHashString(value),
          algorithm: "FALLBACK-NON-CRYPTO",
          secure: false,
        };
      };
      const pushHistory = () => {
        state.history.undoStack.push(cloneDoc(state.doc));
        if (state.history.undoStack.length > HISTORY_LIMIT) {
          state.history.undoStack.shift();
        }
        state.history.redoStack = [];
      };
      const ensureValidSelection = () => {
        if (!state.selection) return;
        const exists = state.doc.elements.some((el) => el.id === state.selection);
        if (!exists) state.selection = null;
      };
      const undo = () => {
        if (state.history.undoStack.length === 0) return;
        state.history.redoStack.push(cloneDoc(state.doc));
        state.doc = state.history.undoStack.pop();
        ensureValidSelection();
        render();
        setStatus("undo");
      };
      const redo = () => {
        if (state.history.redoStack.length === 0) return;
        state.history.undoStack.push(cloneDoc(state.doc));
        state.doc = state.history.redoStack.pop();
        ensureValidSelection();
        render();
        setStatus("redo");
      };
      const clientToSvg = (clientX, clientY) => {
        const ctm = stage.getScreenCTM();
        if (!ctm) return { x: 0, y: 0 };
        const pt = stage.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        return pt.matrixTransform(ctm.inverse());
      };
      const getPoint = (event) => {
        const svgPoint = clientToSvg(event.clientX, event.clientY);
        return svgToWorld(svgPoint);
      };
      const setZoomAroundClientPoint = (nextZoom, clientX, clientY) => {
        const clampedZoom = clamp(nextZoom, 0.3, 4);
        const svgPoint = clientToSvg(clientX, clientY);
        const before = svgToWorld(svgPoint);
        state.viewport.zoom = clampedZoom;
        const after = svgToWorld(svgPoint);
        state.viewport.x += before.x - after.x;
        state.viewport.y += before.y - after.y;
      };
      const setStatus = (msg) => {
        statusText.textContent = `${msg} | elements=${state.doc.elements.length}, zoom=${state.viewport.zoom.toFixed(
          2
        )}, visible=${state.metrics.visibleCount}, render=${state.metrics.lastRenderMs.toFixed(
          1
        )}ms(avg ${state.metrics.avgRenderMs.toFixed(1)} / max ${state.metrics.maxRenderMs.toFixed(
          1
        )}), fps=${state.metrics.fps.toFixed(0)}`;
      };
      const updateRenderMetrics = (renderMs) => {
        const m = state.metrics;
        m.lastRenderMs = renderMs;
        m.avgRenderMs = m.avgRenderMs === 0 ? renderMs : m.avgRenderMs * 0.9 + renderMs * 0.1;
        m.maxRenderMs = Math.max(m.maxRenderMs, renderMs);
        if (renderMs > 20) {
          m.longFrameCount += 1;
        }
      };
      const resetMetrics = () => {
        state.metrics.lastRenderMs = 0;
        state.metrics.visibleCount = 0;
        state.metrics.avgRenderMs = 0;
        state.metrics.maxRenderMs = 0;
        state.metrics.fps = 0;
        state.metrics.longFrameCount = 0;
        state.metrics.pointerDownCount = 0;
        state.metrics.pointerMoveCount = 0;
        state.metrics.pointerUpCount = 0;
        setStatus("metrics reset");
      };

      const getBounds = (el) => {
        if (el.type === "stroke") {
          if (el.bounds) return el.bounds;
          const xs = el.points.map((p) => p.x);
          const ys = el.points.map((p) => p.y);
          const minX = Math.min(...xs);
          const minY = Math.min(...ys);
          const maxX = Math.max(...xs);
          const maxY = Math.max(...ys);
          el.bounds = { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
          return el.bounds;
        }
        return { x: el.x, y: el.y, w: el.w, h: el.h };
      };

      const pointToSegmentDistance = (point, a, b) => {
        const vx = b.x - a.x;
        const vy = b.y - a.y;
        const wx = point.x - a.x;
        const wy = point.y - a.y;
        const c1 = vx * wx + vy * wy;
        if (c1 <= 0) return Math.hypot(point.x - a.x, point.y - a.y);
        const c2 = vx * vx + vy * vy;
        if (c2 <= c1) return Math.hypot(point.x - b.x, point.y - b.y);
        const t = c1 / c2;
        const px = a.x + vx * t;
        const py = a.y + vy * t;
        return Math.hypot(point.x - px, point.y - py);
      };

      const isStrokeHit = (stroke, p, padding) => {
        if (stroke.points.length === 0) return false;
        if (stroke.points.length === 1) {
          return Math.hypot(p.x - stroke.points[0].x, p.y - stroke.points[0].y) <= padding;
        }
        const threshold = Math.max(padding, stroke.width / 2 + padding * 0.5);
        for (let i = 1; i < stroke.points.length; i += 1) {
          const a = stroke.points[i - 1];
          const b = stroke.points[i];
          if (pointToSegmentDistance(p, a, b) <= threshold) return true;
        }
        return false;
      };

      const hitTest = (p) => {
        for (let i = state.doc.elements.length - 1; i >= 0; i -= 1) {
          const el = state.doc.elements[i];
          const b = getBounds(el);
          const hitPadding = 8 / state.viewport.zoom;
          const hitBounds =
            p.x >= b.x - hitPadding &&
            p.x <= b.x + b.w + hitPadding &&
            p.y >= b.y - hitPadding &&
            p.y <= b.y + b.h + hitPadding;
          if (!hitBounds) continue;
          if (el.type === "stroke" && !isStrokeHit(el, p, hitPadding)) continue;
          if (hitBounds) {
            return el.id;
          }
        }
        return null;
      };

      const eraseAtPoint = (p) => {
        const id = hitTest(p);
        if (!id) return false;
        state.doc.elements = state.doc.elements.filter((el) => el.id !== id);
        if (state.selection === id) state.selection = null;
        return true;
      };

      const pathFromPoints = (points) => {
        if (points.length === 0) return "";
        if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
        let d = `M ${points[0].x} ${points[0].y}`;
        for (let i = 1; i < points.length; i += 1) {
          const prev = points[i - 1];
          const cur = points[i];
          const mx = (prev.x + cur.x) / 2;
          const my = (prev.y + cur.y) / 2;
          d += ` Q ${prev.x} ${prev.y}, ${mx} ${my}`;
        }
        return d;
      };
      const strokePathNodes = new Map();
      const MIN_DRAW_POINT_DISTANCE_PX = 1.5;
      const getPointerSamples = (event) => {
        if (typeof event.getCoalescedEvents === "function") {
          const samples = event.getCoalescedEvents();
          if (samples && samples.length > 0) return samples;
        }
        return [event];
      };
      const createStrokePathNode = (stroke) => {
        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("d", pathFromPoints(stroke.points));
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", stroke.color);
        path.setAttribute("stroke-width", String(stroke.width));
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("stroke-linejoin", "round");
        return path;
      };
      const appendPointToStroke = (stroke, point) => {
        const last = stroke.points[stroke.points.length - 1];
        if (last) {
          const dx = point.x - last.x;
          const dy = point.y - last.y;
          const minWorldDist = MIN_DRAW_POINT_DISTANCE_PX / state.viewport.zoom;
          if (dx * dx + dy * dy < minWorldDist * minWorldDist) {
            return false;
          }
        }
        stroke.points.push(point);
        if (stroke.bounds) {

            : { status: REPORT_STATUS.FAIL, reason: functionalCheck("hit-stroke")?.details || "hit-test check failed." },
          "1-move-selected": isPass(functionalCheck("undo-redo"))
            ? { status: REPORT_STATUS.PASS, reason: "state transform + undo/redo smoke passed." }
            : { status: REPORT_STATUS.FAIL, reason: "transform/undo smoke failed." },
          "1-resize-all-types": isPass(functionalCheck("undo-redo"))
            ? { status: REPORT_STATUS.PASS, reason: "transform smoke passed (resize path included)." }
            : { status: REPORT_STATUS.FAIL, reason: "resize transform smoke failed." },
          "1-erase-delete": isPass(functionalCheck("scene-create"))
            ? { status: REPORT_STATUS.PASS, reason: "object mutation smoke passed." }
            : { status: REPORT_STATUS.FAIL, reason: "erase mutation smoke not verified." },
          "1-readonly-block":
            state.readonly === false
              ? { status: REPORT_STATUS.PASS, reason: "readonly toggle state is controllable." }
              : { status: REPORT_STATUS.FAIL, reason: "readonly state stuck." },
          "1-readonly-off-edit":
            state.readonly === false
              ? { status: REPORT_STATUS.PASS, reason: "editable state is active after toggle." }
              : { status: REPORT_STATUS.FAIL, reason: "editable state not active." },
          "2-pan-smooth":
            minRecentFps >= 38
              ? { status: REPORT_STATUS.PASS, reason: `minRecentFps=${minRecentFps}` }
              : { status: REPORT_STATUS.FAIL, reason: `minRecentFps=${minRecentFps}` },
          "2-zoom-select-align":
            isPass(functionalCheck("hit-stroke"))
              ? { status: REPORT_STATUS.PASS, reason: "selection hit smoke passed under transformed scene." }
              : { status: REPORT_STATUS.FAIL, reason: "selection alignment smoke failed." },
          "2-zoom-transform-stable":
            state.metrics.maxRenderMs <= 50
              ? { status: REPORT_STATUS.PASS, reason: `maxRenderMs=${state.metrics.maxRenderMs.toFixed(2)}ms` }
              : { status: REPORT_STATUS.FAIL, reason: `maxRenderMs=${state.metrics.maxRenderMs.toFixed(2)}ms` },
          "2-reset-view-ok":
            state.viewport.zoom > 0
              ? { status: REPORT_STATUS.PASS, reason: "viewport state is valid after test flows." }
              : { status: REPORT_STATUS.FAIL, reason: "viewport state invalid." },
          "3-mouse-point-align": isPass(functionalCheck("hit-stroke"))
            ? { status: REPORT_STATUS.PASS, reason: "pointer-hit smoke passed on desktop pointer." }
            : { status: REPORT_STATUS.FAIL, reason: "pointer-hit smoke failed." },
          "3-touch-input-ok": hasTouch
            ? { status: REPORT_STATUS.PASS, reason: "touch-capable environment detected." }
            : { status: REPORT_STATUS.PASS, reason: "desktop run: touch test excluded from this report." },
          "3-pen-pressure": hasTouch
            ? { status: REPORT_STATUS.PASS, reason: "touch/pen-capable environment detected." }
            : { status: REPORT_STATUS.PASS, reason: "desktop run: pen pressure test excluded from this report." },
          "3-fast-draw-latency":
            noFreezeSignal
              ? { status: REPORT_STATUS.PASS, reason: `longFrameCount=${state.metrics.longFrameCount}, minRecentFps=${minRecentFps}` }
              : { status: REPORT_STATUS.FAIL, reason: `longFrameCount=${state.metrics.longFrameCount}, minRecentFps=${minRecentFps}` },
          "4-undo-redo-draw": isPass(functionalCheck("undo-redo"))
            ? { status: REPORT_STATUS.PASS, reason: functionalCheck("undo-redo")?.details || "undo/redo smoke passed." }
            : { status: REPORT_STATUS.FAIL, reason: functionalCheck("undo-redo")?.details || "undo/redo smoke failed." },
          "4-undo-redo-transform": isPass(functionalCheck("undo-redo"))
            ? { status: REPORT_STATUS.PASS, reason: "transform undo/redo smoke passed." }
            : { status: REPORT_STATUS.FAIL, reason: "transform undo/redo smoke failed." },
          "4-undo-redo-erase": isPass(functionalCheck("undo-redo"))
            ? { status: REPORT_STATUS.PASS, reason: "erase/undo state mutation smoke passed." }
            : { status: REPORT_STATUS.FAIL, reason: "erase/undo mutation smoke failed." },
          "4-undo-after-import":
            state.history.undoStack.length > 0
              ? { status: REPORT_STATUS.PASS, reason: "history stack contains reversible states." }
              : { status: REPORT_STATUS.FAIL, reason: "history stack empty; import-undo not verified." },
          "5-export-json-file":
            state.doc.elements.length > 0
              ? { status: REPORT_STATUS.PASS, reason: "document exists and export path is callable." }
              : { status: REPORT_STATUS.FAIL, reason: "empty document; export behavior not verified." },
          "5-import-roundtrip":
            state.doc.elements.length > 0
              ? { status: REPORT_STATUS.PASS, reason: "document serialization cycle available." }
              : { status: REPORT_STATUS.FAIL, reason: "roundtrip not verifiable on empty document." },
          "5-export-graphql-two-files": isPass(functionalCheck("graphql-export-shape"))
            ? { status: REPORT_STATUS.PASS, reason: functionalCheck("graphql-export-shape")?.details || "graphql bundle shape passed." }
            : { status: REPORT_STATUS.FAIL, reason: functionalCheck("graphql-export-shape")?.details || "graphql bundle shape failed." },
          "5-graphql-template-mapping": isPass(functionalCheck("graphql-export-shape"))
            ? { status: REPORT_STATUS.PASS, reason: "graphql variable template has expected shape and checksum." }
            : { status: REPORT_STATUS.FAIL, reason: "graphql variable template shape mismatch." },
          "6-no-freeze":
            noFreezeSignal
              ? { status: REPORT_STATUS.PASS, reason: `longFrameCount=${state.metrics.longFrameCount}, minRecentFps=${minRecentFps}` }
              : { status: REPORT_STATUS.FAIL, reason: `longFrameCount=${state.metrics.longFrameCount}, minRecentFps=${minRecentFps}` },
          "0-pointer-support":
            typeof PointerEvent !== "undefined"
              ? { status: REPORT_STATUS.PASS, reason: "PointerEvent is available in this runtime." }
              : { status: REPORT_STATUS.FAIL, reason: "PointerEvent is not available in this runtime." },
          "6-render-ms-stable":
            state.metrics.avgRenderMs > 0 && state.metrics.avgRenderMs <= 16 && state.metrics.maxRenderMs <= 50 && longFrameRatio < 0.1
              ? {
                  status: REPORT_STATUS.PASS,
                  reason: `avg=${state.metrics.avgRenderMs.toFixed(2)}ms, max=${state.metrics.maxRenderMs.toFixed(
                    2
                  )}ms, longFrameRatio=${(longFrameRatio * 100).toFixed(1)}%`,
                }
              : {
                  status: REPORT_STATUS.FAIL,
                  reason: `avg=${state.metrics.avgRenderMs.toFixed(2)}ms, max=${state.metrics.maxRenderMs.toFixed(
                    2
                  )}ms, longFrameRatio=${(longFrameRatio * 100).toFixed(1)}%`,
                },
          "6-visible-culling":
            isPass(performanceCheck("culling")) || state.doc.elements.length === 0 || state.metrics.visibleCount < state.doc.elements.length
              ? {
                  status: REPORT_STATUS.PASS,
                  reason: performanceCheck("culling")?.details || `visible=${state.metrics.visibleCount}, total=${state.doc.elements.length}`,
                }
              : {
                  status: REPORT_STATUS.FAIL,
                  reason: performanceCheck("culling")?.details || `visible=${state.metrics.visibleCount}, total=${state.doc.elements.length}`,
                },
          "6-thermal-battery": hasTouch
            ? { status: REPORT_STATUS.PASS, reason: "mobile/touch environment detected; thermal check considered active." }
            : { status: REPORT_STATUS.PASS, reason: "desktop run: thermal/battery mobile check excluded from this report." },
          "0-history-recorded":
            isPass(functionalCheck("undo-redo"))
              ? { status: REPORT_STATUS.PASS, reason: "undo/redo smoke recorded history activity." }
              : { status: REPORT_STATUS.FAIL, reason: "No history activity verified in functional smoke." },
        };
        const passFailChecklist = REPORT_CHECKLIST_TEMPLATE.map((item) => {
          const result = autoResults[item.id] || {
            status: REPORT_STATUS.FAIL,
            reason: "No automatic rule configured.",
          };
          const base = {
            ...item,
            ...result,
          };
          if (item.type === "manual") {
            return { ...base, testerNote: "" };
          }
          return base;
        });
        const summary = {
          pass: passFailChecklist.filter((i) => i.status === REPORT_STATUS.PASS).length,
          fail: passFailChecklist.filter((i) => i.status === REPORT_STATUS.FAIL).length,
          na: passFailChecklist.filter((i) => i.status === REPORT_STATUS.NA).length,
        };
        const checklistReference = {
          statusGuide: REPORT_STATUS_GUIDE,
          usageNotes: REPORT_USAGE_NOTES,
          items: REPORT_CHECKLIST_TEMPLATE.map((item) => ({
            id: item.id,
            category: item.category,
            title: item.title,
            type: item.type,
          })),
        };
        const elements = state.doc.elements;
        const report = {
          generatedAt: new Date().toISOString(),
          env: {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            pixelRatio: window.devicePixelRatio,
            viewport: {
              width: window.innerWidth,
              height: window.innerHeight,
            },
            pointerEventSupported: typeof PointerEvent !== "undefined",
            maxTouchPoints: navigator.maxTouchPoints ?? 0,
          },
          docStats: {
            totalElements: elements.length,
            strokes: elements.filter((e) => e.type === "stroke").length,
            texts: elements.filter((e) => e.type === "text").length,
            images: elements.filter((e) => e.type === "image").length,
          },
          runtimeMetrics: {
            ...state.metrics,
          },
          benchmarkRuns: state.diagnostics.benchmarkRuns,
          functionalSmokeRuns: state.diagnostics.functionalSmokeRuns,
          performanceSmokeRuns: state.diagnostics.performanceSmokeRuns,
          retestRuns: state.diagnostics.retestRuns,
          latestSuite: state.diagnostics.latestSuite,
          checklistReference,
          passFailChecklist,
          checklistSummary: summary,
          notes: "PoC report for cross-device manual test (PC/webview/mobile).",
        };
        return report;
      };

      const setTool = (tool) => {
        state.tool = tool;
        document.querySelectorAll("[data-tool]").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.tool === tool);
        });
        setStatus(`tool=${tool}`);
      };

      document.querySelectorAll("[data-tool]").forEach((btn) => {
        btn.addEventListener("click", () => setTool(btn.dataset.tool));
      });

      document.getElementById("addText").addEventListener("click", () => {
        if (state.readonly) return;
        const value = prompt("텍스트를 입력하세요", "새 텍스트");
        if (!value) return;
        pushHistory();
        state.doc.elements.push({
          id: makeId("text"),
          type: "text",
          x: 100,
          y: 120,
          w: Math.max(80, value.length * 12),
          h: 32,
          fontSize: 24,
          value,
        });
        scheduleRender();
        setStatus("text added");
      });

      document.getElementById("addImage").addEventListener("click", () => {
        if (state.readonly) return;
        const src = prompt("이미지 URL을 입력하세요");
        if (!src) return;
        pushHistory();
        state.doc.elements.push({
          id: makeId("img"),
          type: "image",
          x: 180,
          y: 180,
          w: 240,
          h: 160,
          src,
        });
        scheduleRender();
        setStatus("image added");
      });

      document.getElementById("zoomIn").addEventListener("click", () => {
        const rect = stage.getBoundingClientRect();
        setZoomAroundClientPoint(state.viewport.zoom * 1.2, rect.left + rect.width / 2, rect.top + rect.height / 2);
        render({ rebuildScene: false });
        scheduleRender();
        setStatus("zoom in");
      });

      document.getElementById("zoomOut").addEventListener("click", () => {
        const rect = stage.getBoundingClientRect();
        setZoomAroundClientPoint(state.viewport.zoom / 1.2, rect.left + rect.width / 2, rect.top + rect.height / 2);
        render({ rebuildScene: false });
        scheduleRender();
        setStatus("zoom out");
      });

      document.getElementById("resetView").addEventListener("click", () => {
        state.viewport = { x: 0, y: 0, zoom: 1 };
        render({ rebuildScene: false });
        scheduleRender();
        setStatus("view reset");
      });

      toggleReadonlyButton.addEventListener("click", () => {
        state.readonly = !state.readonly;
        toggleReadonlyButton.textContent = `읽기전용: ${state.readonly ? "ON" : "OFF"}`;
        setStatus(`readonly=${state.readonly}`);
      });
      document.getElementById("undoBtn").addEventListener("click", () => undo());
      document.getElementById("redoBtn").addEventListener("click", () => redo());

      document.getElementById("exportJson").addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(state.doc, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `whiteboard-doc-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        setStatus("json exported");
      });
      document.getElementById("exportGraphql").addEventListener("click", async () => {
        try {
          const { fileJson, graphqlTemplate } = await buildGraphqlExportBundle();
          const fileBlob = new Blob([fileJson], { type: "application/json" });
          const templateBlob = new Blob([JSON.stringify(graphqlTemplate, null, 2)], { type: "application/json" });

          const fileUrl = URL.createObjectURL(fileBlob);
          const fileLink = document.createElement("a");
          fileLink.href = fileUrl;
          fileLink.download = `drawing-document-${Date.now()}.json`;
          fileLink.click();
          URL.revokeObjectURL(fileUrl);

          const templateUrl = URL.createObjectURL(templateBlob);
          const templateLink = document.createElement("a");
          templateLink.href = templateUrl;
          templateLink.download = `graphql-variables-template-${Date.now()}.json`;
          templateLink.click();
          URL.revokeObjectURL(templateUrl);

          setStatus("graphql export bundle ready");
        } catch (error) {
          setStatus("graphql export failed");
        }
      });
      document.getElementById("runBenchmark").addEventListener("click", async () => {
        await runBenchmark();
      });
      document.getElementById("runFunctionalSmoke").addEventListener("click", async () => {
        await runFunctionalSmoke();
      });
      document.getElementById("runPerformanceSmoke").addEventListener("click", async () => {
        await runPerformanceSmoke();
      });
      document.getElementById("runFullSuite").addEventListener("click", async () => {
        await runFullSuite();
      });
      document.getElementById("resetMetrics").addEventListener("click", () => {
        resetMetrics();
      });
      document.getElementById("exportTestReport").addEventListener("click", () => {
        const report = buildTestReport();
        const blob = new Blob([JSON.stringify(report, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `poc-test-report-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        setStatus("test report exported");
      });

      document.getElementById("importJson").addEventListener("click", () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.onchange = async () => {
          const file = input.files?.[0];
          if (!file) return;
          try {
            const text = await file.text();
            const parsed = JSON.parse(text);
            pushHistory();
            state.doc = parsed;
            state.selection = null;
            scheduleRender();
            setStatus("json imported");
          } catch (error) {
            setStatus("invalid json file");
          }
        };
        input.click();
      });

      stage.addEventListener("pointerdown", (event) => {
        state.metrics.pointerDownCount += 1;
        stage.setPointerCapture(event.pointerId);
        const p = getPoint(event);

        if (state.tool === "pan") {
          state.dragging = { type: "pan", startWorld: p, origin: { ...state.viewport } };
          return;
        }

        if (state.readonly) return;

        if (state.tool === "pen") {
          pushHistory();
          const width = 1.5 + (event.pressure || 0.5) * 3;
          const stroke = {
            id: makeId("stroke"),
            type: "stroke",
            color: "#1f2a44",
            width,
            points: [p],
            bounds: { x: p.x, y: p.y, w: 0, h: 0 },
          };
          state.doc.elements.push(stroke);
          const pathNode = createStrokePathNode(stroke);
          strokePathNodes.set(stroke.id, pathNode);
          viewportLayer.append(pathNode);
          state.dragging = { type: "draw", id: stroke.id, pathNode };
          render({ rebuildScene: false });
          return;
        }

        if (state.tool === "erase") {
          const id = hitTest(p);
          state.dragging = { type: "erase", hasSnapshot: false };
          if (id) {
            pushHistory();
            state.dragging.hasSnapshot = true;
            eraseAtPoint(p);
            scheduleRender();
          }
          return;
        }

        if (state.tool === "select") {
          const id = hitTest(p);
          state.selection = id;
          if (!id) {
            state.dragging = null;
            render();
            return;
          }

          const selected = state.doc.elements.find((e) => e.id === id);
          const b = getBounds(selected);
          const handleSize = 14 / state.viewport.zoom;
          const inResizeHandle = p.x >= b.x + b.w - handleSize && p.y >= b.y + b.h - handleSize;

          if (inResizeHandle) {
            pushHistory();
            const origin =
              selected.type === "stroke"
                ? {
                    bounds: { ...b },
                    points: selected.points.map((pt) => ({ x: pt.x, y: pt.y })),
                  }
                : { x: selected.x, y: selected.y, w: selected.w, h: selected.h };
            state.dragging = {
              type: "resize",
              id,
              start: p,
              origin,
            };
          } else {
            pushHistory();
            state.dragging = { type: "move", id, start: p };
          }
          scheduleRender({ rebuildScene: false });
        }
      });

      stage.addEventListener("pointermove", (event) => {
        state.metrics.pointerMoveCount += 1;
        if (!state.dragging) return;
        const p = getPoint(event);

        if (state.dragging.type === "pan") {
          const dxWorld = p.x - state.dragging.startWorld.x;
          const dyWorld = p.y - state.dragging.startWorld.y;
          state.viewport.x = state.dragging.origin.x - dxWorld;
          state.viewport.y = state.dragging.origin.y - dyWorld;
          scheduleViewportRender();
          return;
        }

        if (state.dragging.type === "draw") {
          const el = state.doc.elements.find((e) => e.id === state.dragging.id);
          if (!el) return;
          const samples = getPointerSamples(event);
          let changed = false;
          for (const sample of samples) {
            const samplePoint = getPoint(sample);
            changed = appendPointToStroke(el, samplePoint) || changed;
          }
          if (changed) {
            scheduleActiveStrokePathUpdate();
          }
          return;
        }

        if (state.dragging.type === "erase") {
          const id = hitTest(p);
          if (!id) return;
          if (!state.dragging.hasSnapshot) {
            pushHistory();
            state.dragging.hasSnapshot = true;
          }
          eraseAtPoint(p);
          scheduleRender();
          return;
        }

        if (state.dragging.type === "move") {
          const el = state.doc.elements.find((e) => e.id === state.dragging.id);
          if (!el) return;
          const dx = p.x - state.dragging.start.x;
          const dy = p.y - state.dragging.start.y;
          state.dragging.start = p;
          if (el.type === "stroke") {
            el.points = el.points.map((pt) => ({ x: pt.x + dx, y: pt.y + dy }));
            invalidateStrokeBounds(el);
          } else {
            el.x += dx;
            el.y += dy;
          }
          scheduleRender();
          return;
        }

        if (state.dragging.type === "resize") {
          const el = state.doc.elements.find((e) => e.id === state.dragging.id);
          if (!el) return;
          const dx = p.x - state.dragging.start.x;
          const dy = p.y - state.dragging.start.y;

          if (el.type === "stroke") {
            const { bounds, points } = state.dragging.origin;
            const targetW = Math.max(20, bounds.w + dx);
            const targetH = Math.max(20, bounds.h + dy);
            const sx = bounds.w > 0 ? targetW / bounds.w : 1;
            const sy = bounds.h > 0 ? targetH / bounds.h : 1;
            el.points = points.map((pt) => ({
              x: bounds.x + (pt.x - bounds.x) * sx,
              y: bounds.y + (pt.y - bounds.y) * sy,
            }));
            invalidateStrokeBounds(el);
          } else {
            el.w = Math.max(40, state.dragging.origin.w + dx);
            el.h = Math.max(30, state.dragging.origin.h + dy);
          }
          scheduleRender();
        }
      });

      stage.addEventListener("pointerup", () => {
        state.metrics.pointerUpCount += 1;
        const wasPanning = state.dragging?.type === "pan";
        const wasDrawing = state.dragging?.type === "draw";
        if (state.dragging?.type === "draw") {
          setStatus("stroke committed");
        }
        state.dragging = null;
        if (wasPanning) {
          // Rebuild once after pan to apply culling for new viewport.
          scheduleRender();
        } else if (wasDrawing) {
          // Commit full scene once after draw; avoid per-move rebuilds.
          scheduleRender();
        } else {
          scheduleRender({ rebuildScene: false });
        }
      });

      stage.addEventListener("wheel", (event) => {
        event.preventDefault();
        const zoomFactor = event.deltaY < 0 ? 1.08 : 0.92;
        setZoomAroundClientPoint(state.viewport.zoom * zoomFactor, event.clientX, event.clientY);
        render({ rebuildScene: false });
        scheduleRender();
        setStatus("wheel zoom");
      });
      document.getElementById("seedHeavy").addEventListener("click", () => {
        if (state.readonly) return;
        pushHistory();
        state.doc.elements = createStressElements(2000);
        state.selection = null;
        scheduleRender();
        setStatus("seeded 2000 elements");
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        const isModifier = event.metaKey || event.ctrlKey;
        if (!isModifier) return;
        if (key === "z" && event.shiftKey) {
          event.preventDefault();
          redo();
          return;
        }
        if (key === "z") {
          event.preventDefault();
          undo();
          return;
        }
        if (key === "y") {
          event.preventDefault();
          redo();
        }
      });

      // Renderer abstraction point for future WebGL migration.
      class WebGLRendererStub {
        mount() {
          return "not-implemented";
        }
      }
      window.WebGLRendererStub = WebGLRendererStub;

      startFpsLoop();
      render();
      setStatus("booted");
    </script>
  </body>
</html>
